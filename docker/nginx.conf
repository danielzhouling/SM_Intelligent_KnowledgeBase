# ==================================================================
# SM-Dmall ERP 智能知识库系统 - Nginx 配置
# ==================================================================
# 统一入口：
#   - 静态文件服务（demo/ 和 admin/）
#   - /api/* -> FastAPI后端 (app-backend:8000)
#   - /v1/* -> Dify API (api:5001)
#   - SSE流式响应支持
#
# 使用方法:
#   将此文件挂载到 Nginx 容器: ./nginx.conf:/etc/nginx/nginx.conf:ro
# ==================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # 上传大小限制
    client_max_body_size 15M;

    # 隐藏Nginx版本
    server_tokens off;

    # 速度限制区
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 80;
        server_name localhost;

        # Health check endpoint
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ============================================================
        # 静态文件服务 - 前端页面
        # ============================================================

        # Demo前端 (用户端)
        location /demo/ {
            alias /usr/share/nginx/html/demo/;
            index index.html;
            try_files $uri $uri/ /demo/index.html;

            # 静态资源缓存
            location ~* \.(js|css)$ {
                add_header Cache-Control "no-cache";
            }
            location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 7d;
                add_header Cache-Control "public";
            }
        }

        # CSS文件（共享 - 支持admin/../css路径解析）
        location /css/ {
            alias /usr/share/nginx/html/demo/css/;
            add_header Cache-Control "no-cache";
        }

        # Admin后台
        location /admin/ {
            alias /usr/share/nginx/html/admin/;
            index index.html;
            try_files $uri $uri/ /admin/index.html;
        }

        # JS文件（共享）
        location /js/ {
            alias /usr/share/nginx/html/js/;
            add_header Cache-Control "no-cache";
        }

        # 根路径 -> 重定向到 demo
        location = / {
            return 302 /demo/;
        }

        # ============================================================
        # API代理 - FastAPI后端
        # ============================================================

        location /api/ {
            # 限流
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://app-backend:8000;
            proxy_http_version 1.1;

            # 设置Host头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE流式响应支持
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;

            # 超时设置 (流式响应需要较长超时)
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # ============================================================
        # Dify API代理
        # ============================================================

        # Chat API (SSE流式)
        location /v1/ {
            proxy_pass http://api:5001/v1/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE关键头
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;

            # 流式超时
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # Console API (Dify管理)
        location /console/api/ {
            # 修复双倍路径问题
            rewrite ^/console/api/console/api(.*)$ /console/api$1 break;

            proxy_pass http://api:5001/console/api;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
        }

        # ============================================================
        # Dify Web UI
        # ============================================================

        location / {
            proxy_pass http://web:3000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
