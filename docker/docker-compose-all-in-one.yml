# ==================================================================
# SM-Dmall ERP 智能知识库系统 - All-in-One Docker Compose
# ==================================================================
# 描述: 整合 Qdrant 向量数据库 + Dify AI 平台的一键部署配置
#       包含 Ollama 本地模型服务集成
#
# 使用方法:
#   docker-compose -f docker/docker-compose-all-in-one.yml up -d
#   docker-compose -f docker/docker-compose-all-in-one.yml down
#
# 依赖:
#   - Docker Desktop (Mac/Windows) 或 Docker Engine (Linux)
#   - Ollama 本地安装 (brew install ollama)
#   - 端口: 6333, 6334, 3001 可用
# ==================================================================

services:
  # ==================================================================
  # Qdrant 向量数据库
  # ==================================================================
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: sm-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"      # REST API
      - "6334:6334"      # gRPC API
    volumes:
      - ./volumes/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=32
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sm-network

  # ==================================================================
  # Dify PostgreSQL 数据库
  # ==================================================================
  postgres:
    image: postgres:15-alpine
    container_name: sm-dify-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=dify-db-pass
      - POSTGRES_DB=dify
      - POSTGRES_MAX_CONNECTIONS=100
      - POSTGRES_SHARED_BUFFERS=128MB
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sm-network

  # ==================================================================
  # Dify Redis 缓存
  # ==================================================================
  redis:
    image: redis:7-alpine
    container_name: sm-dify-redis
    restart: unless-stopped
    command: redis-server --requirepass dify-redis-pass --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dify-redis-pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sm-network

  # ==================================================================
  # Dify API 服务
  # ==================================================================
  api:
    image: langgenius/dify-api:1.13.3
    container_name: sm-dify-api
    restart: unless-stopped
    environment:
      # 密钥配置
      - SECRET_KEY=dify-secret-key-change-in-production-2026
      - INIT_PASSWORD=dify123456

      # URL 配置
      - CONSOLE_WEB_URL=http://localhost:3001
      - CONSOLE_API_URL=http://localhost:3001/console/api
      - SERVICE_API_URL=http://localhost:3001
      - APP_WEB_URL=http://localhost:3001
      - APP_API_URL=http://localhost:3001

      # Ollama 配置 (通过宿主机访问)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

      # 数据库配置
      - DB_USERNAME=postgres
      - DB_PASSWORD=dify-db-pass
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=dify

      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PASSWORD=dify-redis-pass
      - REDIS_PORT=6379

      # 存储配置
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/storage

      # 向量数据库配置 (Qdrant)
      - VECTOR_STORE=qdrant
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=
      - QDRANT_CLIENT_TIMEOUT=20
      - QDRANT_GRPC_ENABLED=false

      # Celery 配置
      - CELERY_BROKER_URL=redis://:dify-redis-pass@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:dify-redis-pass@redis:6379/1

      # 日志配置
      - LOG_LEVEL=INFO

      # Sentry (生产环境建议配置)
      - SENTRY_DSN=

      # Plugin Daemon 配置
      - PLUGIN_DAEMON_URL=http://plugin_daemon:5002
      - PLUGIN_DAEMON_KEY=lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi
      - PLUGIN_DIFY_INNER_API_KEY=QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1

      # Sandbox 配置
      - CODE_EXECUTION_ENDPOINT=http://sandbox:8194
      - CODE_EXECUTION_API_KEY=dify-sandbox

      # SSRF Proxy 配置
      - SSRF_PROXY_HTTP_URL=http://ssrf_proxy:3128
      - SSRF_PROXY_HTTPS_URL=http://ssrf_proxy:3128
    volumes:
      - ./volumes/dify/storage:/app/storage
      - ./volumes/dify/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      plugin_daemon:
        condition: service_started
      sandbox:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - sm-network
      - ssrf_proxy_network

  # ==================================================================
  # Dify Worker (异步任务处理)
  # ==================================================================
  worker:
    image: langgenius/dify-api:1.13.3
    container_name: sm-dify-worker
    restart: unless-stopped
    environment:
      # 密钥配置
      - SECRET_KEY=dify-secret-key-change-in-production-2026
      - INIT_PASSWORD=dify123456
      - MODE=worker

      # URL 配置
      - CONSOLE_WEB_URL=http://localhost:3001
      - APP_WEB_URL=http://localhost:3001

      # Ollama 配置
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

      # 数据库配置
      - DB_USERNAME=postgres
      - DB_PASSWORD=dify-db-pass
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=dify

      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PASSWORD=dify-redis-pass
      - REDIS_PORT=6379

      # 存储配置
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/storage

      # 向量数据库配置
      - VECTOR_STORE=qdrant
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=
      - QDRANT_CLIENT_TIMEOUT=20
      - QDRANT_GRPC_ENABLED=false

      # Celery 配置
      - CELERY_BROKER_URL=redis://:dify-redis-pass@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:dify-redis-pass@redis:6379/1

      # 日志配置
      - LOG_LEVEL=INFO

      # Plugin Daemon 配置
      - PLUGIN_DAEMON_URL=http://plugin_daemon:5002
      - PLUGIN_DAEMON_KEY=lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi
      - PLUGIN_DIFY_INNER_API_KEY=QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1

      # Sandbox 配置
      - CODE_EXECUTION_ENDPOINT=http://sandbox:8194
      - CODE_EXECUTION_API_KEY=dify-sandbox

      # SSRF Proxy 配置
      - SSRF_PROXY_HTTP_URL=http://ssrf_proxy:3128
      - SSRF_PROXY_HTTPS_URL=http://ssrf_proxy:3128
    volumes:
      - ./volumes/dify/storage:/app/storage
      - ./volumes/dify/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      plugin_daemon:
        condition: service_started
      sandbox:
        condition: service_started
    networks:
      - sm-network
      - ssrf_proxy_network

  # ==================================================================
  # SSRF Proxy (for sandbox network isolation)
  # ==================================================================
  ssrf_proxy:
    image: ubuntu/squid:latest
    container_name: sm-dify-ssrf-proxy
    restart: always
    volumes:
      - ./volumes/ssrf_proxy:/etc/squid
    command: ["squid", "-N", "-f", "/etc/squid/squid.conf"]
    networks:
      - sm-network
      - ssrf_proxy_network

  # ==================================================================
  # Sandbox (Code Execution Environment)
  # ==================================================================
  sandbox:
    image: langgenius/dify-sandbox:0.2.14
    container_name: sm-dify-sandbox
    restart: always
    environment:
      - API_KEY=dify-sandbox
      - GIN_MODE=release
      - WORKER_TIMEOUT=15
      - ENABLE_NETWORK=true
      - HTTP_PROXY=http://ssrf_proxy:3128
      - HTTPS_PROXY=http://ssrf_proxy:3128
      - SANDBOX_PORT=8194
      - PIP_MIRROR_URL=
    volumes:
      - ./volumes/sandbox/dependencies:/dependencies
      - ./volumes/sandbox/conf:/conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8194/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ssrf_proxy_network

  # ==================================================================
  # Plugin Daemon
  # ==================================================================
  plugin_daemon:
    image: langgenius/dify-plugin-daemon:0.5.3-local
    container_name: sm-dify-plugin-daemon
    restart: always
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=dify-db-pass
      - DB_DATABASE=dify_plugin
      - DB_SSL_MODE=disable
      - REDIS_HOST=redis
      - REDIS_PASSWORD=dify-redis-pass
      - REDIS_PORT=6379
      - SERVER_KEY=lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi
      - DIFY_INNER_API_URL=http://api:5001
      - DIFY_INNER_API_KEY=QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1
      - MARKETPLACE_ENABLED=true
      - MARKETPLACE_API_URL=https://marketplace.dify.ai
      - PLUGIN_REMOTE_INSTALLING_HOST=0.0.0.0
      - PLUGIN_REMOTE_INSTALLING_PORT=5003
      - PLUGIN_WORKING_PATH=/app/storage/cwd
      - FORCE_VERIFYING_SIGNATURE=true
      - PYTHON_ENV_INIT_TIMEOUT=120
      - PLUGIN_MAX_EXECUTION_TIMEOUT=600
      - PLUGIN_STDIO_BUFFER_SIZE=1024
      - PLUGIN_STDIO_MAX_BUFFER_SIZE=5242880
      - PIP_MIRROR_URL=
      - PLUGIN_STORAGE_TYPE=local
      - PLUGIN_STORAGE_LOCAL_ROOT=/app/storage
      - PLUGIN_INSTALLED_PATH=plugin
      - PLUGIN_PACKAGE_CACHE_PATH=plugin_packages
      - PLUGIN_MEDIA_CACHE_PATH=assets
    volumes:
      - ./volumes/plugin_daemon:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sm-network

  # ==================================================================
  # Dify Web 前端
  # ==================================================================
  web:
    image: langgenius/dify-web:1.13.3
    container_name: sm-dify-web
    restart: unless-stopped
    environment:
      - CONSOLE_API_URL=/console/api
      - CONSOLE_WEB_URL=http://localhost:3001
      - SERVICE_API_URL=http://localhost:3001
      - APP_WEB_URL=http://localhost:3001
      - APP_ORIGIN=*
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - api
    networks:
      - sm-network

  # ==================================================================
  # Dify Nginx 反向代理
  # ==================================================================
  nginx:
    image: nginx:alpine
    container_name: sm-dify-nginx
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://0.0.0.0:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sm-network

# ==================================================================
# 网络配置
# ==================================================================
networks:
  sm-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
  ssrf_proxy_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16

# ==================================================================
# 数据卷配置
# ==================================================================
volumes:
  qdrant_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  dify_storage:
    driver: local
  dify_logs:
    driver: local
