<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - SM-Dmall ERP</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-container admin-login">
      <div class="login-right">
        <div class="login-box">
          <div class="login-header">
            <div class="admin-logo">
              <svg viewBox="0 0 48 48" fill="none">
                <rect width="48" height="48" rx="10" fill="#1E40AF"/>
                <path d="M14 24L22 32L34 18" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h2>Admin Dashboard</h2>
            <p>Sign in to manage the knowledge base</p>
          </div>

          <form class="login-form">
            <div class="form-group">
              <label for="username">Username</label>
              <input type="text" id="username" placeholder="Enter admin username" required>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">
              <span>Sign In</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
              </svg>
            </button>
          </form>

          <div class="login-divider">
            <span>Demo Account</span>
          </div>

          <div class="demo-accounts">
            <div class="demo-account">
              <div class="demo-info">
                <span class="demo-name">admin</span>
                <span class="demo-role">Super Admin</span>
              </div>
              <span class="demo-pass">admin123</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
