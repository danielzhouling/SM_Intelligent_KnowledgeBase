<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SM-Dmall ERP - Admin Login</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    :root {
      --primary: #1E40AF;
      --primary-light: #3B82F6;
      --primary-dark: #1E3A8A;
      --bg-page: #F1F5F9;
      --bg-card: #FFFFFF;
      --text-primary: #0F172A;
      --text-secondary: #475569;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      background: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-logo svg {
      width: 32px;
      height: 32px;
    }

    .login-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .login-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .form-group input {
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.15s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
    }

    .btn-login {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-login:hover {
      background: var(--primary-dark);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
    }

    .demo-accounts {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .demo-account {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--bg-page);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.15s;
    }

    .demo-account:hover {
      border-color: var(--primary-light);
      background: rgba(30, 64, 175, 0.03);
    }

    .demo-avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
    }

    .demo-info {
      flex: 1;
    }

    .demo-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .demo-role {
      font-size: 12px;
      color: var(--text-muted);
    }

    .demo-pass {
      font-size: 11px;
      font-family: monospace;
      color: var(--text-secondary);
      background: var(--bg-card);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="brand-logo">
          <svg viewBox="0 0 36 36" fill="none">
            <path d="M10 18H26M18 10V26" stroke="white" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
        <h1>Admin Portal</h1>
        <p>Sign in to manage the system</p>
      </div>

      <form class="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-login">
          <span>Sign In</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <div class="divider"><span>Quick Access</span></div>

      <div class="demo-accounts">
        <div class="demo-account">
          <div class="demo-avatar">A</div>
          <div class="demo-info">
            <span class="demo-name">admin</span>
            <span class="demo-role">System Administrator</span>
          </div>
          <span class="demo-pass">admin123</span>
        </div>
        <div class="demo-account">
          <div class="demo-avatar">H</div>
          <div class="demo-info">
            <span class="demo-name">hq-admin</span>
            <span class="demo-role">HQ IT Admin</span>
          </div>
          <span class="demo-pass">password123</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
