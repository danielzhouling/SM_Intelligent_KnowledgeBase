<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SM-Dmall ERP - Admin Login</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    :root {
      --primary: #F97316;
      --primary-light: #FB923C;
      --primary-dark: #EA580C;
      --bg-page: #FFFBF7;
      --bg-card: #FFFFFF;
      --text-primary: #1C1917;
      --text-secondary: #57534E;
      --text-muted: #A8A29E;
      --border: #E7E5E4;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.08);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      background: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-logo svg {
      width: 32px;
      height: 32px;
    }

    .login-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .login-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .form-group input {
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.15s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
    }

    .btn-login {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      background: var(--text-primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-login:hover {
      background: var(--primary);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
    }

    .demo-accounts {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .demo-account {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: #FFF7ED;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.15s;
    }

    .demo-account:hover {
      background: #FED7AA;
    }

    .demo-avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
    }

    .demo-info {
      flex: 1;
    }

    .demo-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .demo-role {
      font-size: 12px;
      color: var(--text-muted);
    }

    .demo-pass {
      font-size: 11px;
      font-family: monospace;
      color: var(--text-secondary);
      background: var(--bg-card);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="brand-logo">
          <svg viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="22" fill="#F97316"/>
            <path d="M16 24C16 19.582 19.582 16 24 16C28.418 16 32 19.582 32 24" stroke="white" stroke-width="3" stroke-linecap="round"/>
            <circle cx="24" cy="30" r="3" fill="white"/>
          </svg>
        </div>
        <h1>Admin Portal</h1>
        <p>Sign in to manage the system</p>
      </div>

      <form class="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-login">
          <span>Sign In</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <div class="divider"><span>Quick Access</span></div>

      <div class="demo-accounts">
        <div class="demo-account">
          <div class="demo-avatar">A</div>
          <div class="demo-info">
            <span class="demo-name">admin</span>
            <span class="demo-role">System Administrator</span>
          </div>
          <span class="demo-pass">admin123</span>
        </div>
        <div class="demo-account">
          <div class="demo-avatar">H</div>
          <div class="demo-info">
            <span class="demo-name">hq-admin</span>
            <span class="demo-role">HQ IT Admin</span>
          </div>
          <span class="demo-pass">password123</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
