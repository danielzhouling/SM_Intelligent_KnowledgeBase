<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SM-Dmall ERP - Login</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div class="logo">
            <svg viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="22" fill="#F97316"/>
              <path d="M16 24C16 19.582 19.582 16 24 16C28.418 16 32 19.582 32 24" stroke="white" stroke-width="3" stroke-linecap="round"/>
              <circle cx="24" cy="30" r="3" fill="white"/>
            </svg>
          </div>
          <h1>Welcome back</h1>
          <p>Sign in to access the knowledge base</p>
        </div>

        <form class="login-form">
          <div class="form-group">
            <input type="text" placeholder="Username" required>
          </div>
          <div class="form-group">
            <input type="password" placeholder="Password" required>
          </div>
          <button type="submit" class="btn-login">
            <span>Sign In</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
        </form>

        <div class="demo-section">
          <span class="demo-label">Quick access</span>
          <div class="demo-accounts">
            <div class="demo-account">
              <div class="demo-avatar">A</div>
              <div class="demo-info">
                <span class="demo-name">admin</span>
                <span class="demo-role">System Admin</span>
              </div>
              <span class="demo-pass">admin123</span>
            </div>
            <div class="demo-account">
              <div class="demo-avatar">H</div>
              <div class="demo-info">
                <span class="demo-name">hq-admin</span>
                <span class="demo-role">HQ IT Admin</span>
              </div>
              <span class="demo-pass">password123</span>
            </div>
            <div class="demo-account">
              <div class="demo-avatar">S</div>
              <div class="demo-info">
                <span class="demo-name">store-manager</span>
                <span class="demo-role">Store Manager</span>
              </div>
              <span class="demo-pass">password123</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="login-bg-decoration"></div>
  </div>
</body>
</html>
