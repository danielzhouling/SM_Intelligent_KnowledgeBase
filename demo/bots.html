<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SM-Dmall ERP Knowledge Base - Select Bot</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page">
    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <svg class="header-logo" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="headerLogoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#667EEA"/>
              <stop offset="100%" style="stop-color:#764BA2"/>
            </linearGradient>
          </defs>
          <rect x="2" y="2" width="36" height="36" rx="6" fill="url(#headerLogoGradient)"/>
          <text x="20" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">SM</text>
        </svg>
        <span class="header-title">SM-Dmall ERP Knowledge Base</span>
      </div>

      <div class="header-actions">
        <div class="user-info">
          <span id="user-name">User</span>
          <span id="user-role" class="user-role">Role</span>
        </div>
        <button id="btn-logout" class="btn-logout">Logout</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="welcome-page">
      <div class="container">
        <div class="welcome-header">
          <h1 class="welcome-title">Welcome, <span id="user-name-header">User</span>!</h1>
          <p class="welcome-subtitle">Select a Bot to start your knowledge base inquiry</p>
        </div>

        <!-- Bot Cards Grid -->
        <div id="bots-grid" class="bots-grid">
          <!-- Bot cards will be rendered by JavaScript -->
        </div>

        <!-- Available Count -->
        <p class="bots-available-count">
          Available Bots: <span id="available-count">0</span>/<span id="total-count">3</span>
        </p>
      </div>
    </main>
  </div>

  <!-- Scripts must be loaded in order: mock-data -> api-service -> app -->
  <script src="js/mock-data.js"></script>
  <script src="js/api-service.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
