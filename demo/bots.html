<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SM-Dmall ERP Knowledge Base - Select Bot</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page">
    <!-- Header -->
    <header class="header" role="banner">
      <div class="header-inner">
        <div class="brand">
          <div class="brand-icon" aria-hidden="true">
            <svg viewBox="0 0 40 40" fill="none">
              <rect width="40" height="40" rx="8" fill="#1E40AF"/>
              <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="brand-text">
            <span class="brand-name">SM-Dmall</span>
            <span class="brand-sub">ERP Knowledge Base</span>
          </div>
        </div>

        <div class="header-right">
          <div class="user-badge">
            <div class="user-avatar" aria-hidden="true">U</div>
            <div class="user-info">
              <span id="user-name" class="user-name">User</span>
              <span id="user-role" class="user-role">Role</span>
            </div>
          </div>
          <button id="btn-logout" class="btn-logout" aria-label="Logout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>

        <!-- Mobile Menu Toggle -->
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" role="main">
      <div class="container">
        <!-- Page Header -->
        <div class="page-header">
          <div class="page-header-text">
            <h1 class="page-title">Knowledge Base</h1>
            <p class="page-desc">Select an AI assistant to help you with your inquiry</p>
          </div>
        </div>

        <!-- Bot Cards Grid -->
        <div id="bots-grid" class="bots-grid" role="list" aria-label="Available bots">
          <!-- Bot cards will be rendered by JavaScript -->
        </div>

        <!-- Available Count -->
        <div class="bots-footer">
          <span class="bots-count">Available: <span id="available-count">0</span>/<span id="total-count">3</span></span>
        </div>
      </div>
    </main>
  </div>

  <!-- Scripts must be loaded in order: mock-data -> api-service -> app -->
  <script src="js/mock-data.js"></script>
  <script src="js/api-service.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
