<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SM-Dmall ERP Knowledge Base - Chat</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page">
    <!-- Header -->
    <header class="app-header" role="banner">
      <div class="header-left">
        <button id="btn-back" class="btn-back" aria-label="Back to Bot Selection">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
        </button>
        <div class="current-bot">
          <span id="header-bot-badge" class="bot-badge-sm bot-badge-a" aria-hidden="true">A</span>
          <div class="bot-info-sm">
            <span id="current-bot-name" class="bot-name-sm">Bot</span>
            <span class="bot-status-sm">Active</span>
          </div>
        </div>
      </div>
      <div class="header-center">
        <span id="current-conversation-title" class="conversation-title"></span>
      </div>
      <div class="header-right">
        <div class="user-mini">
          <span id="user-name" class="user-name-header">User</span>
          <span id="user-role" class="user-role-header">Role</span>
        </div>
        <button id="btn-logout" class="btn-logout" aria-label="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>

      <!-- Mobile Menu Toggle -->
      <button class="chat-mobile-btn" id="chatMobileBtn" aria-label="Open sidebar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </header>

    <!-- Chat Page Layout -->
    <div class="chat-page">
      <!-- Sidebar Overlay for mobile -->
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <!-- Sidebar -->
      <aside class="chat-sidebar" role="complementary" aria-label="Chat sidebar">
        <div class="chat-sidebar-header">
          <div class="chat-bot-info">
            <div class="chat-bot-avatar">
              <span id="bot-avatar-icon">🤖</span>
            </div>
            <div>
              <div id="bot-sidebar-name" class="chat-bot-name">Bot Name</div>
              <div id="bot-sidebar-desc" class="chat-bot-desc">Bot Description</div>
            </div>
          </div>
        </div>

        <!-- Conversations List -->
        <div class="chat-conversations-section">
          <div class="chat-conversations-header">
            <h4 class="chat-conversations-title">Conversations</h4>
            <button id="btn-new-chat" class="btn-new-chat" title="New Conversation" aria-label="New conversation">+</button>
          </div>
          <ul id="conversations-list" class="chat-conversations-list" role="list" aria-label="Conversation list">
            <!-- Conversations will be rendered by JS -->
          </ul>
        </div>

        <div class="chat-sidebar-content">
          <h4 class="chat-knowledge-title">Knowledge Sources</h4>
          <ul id="knowledge-list" class="chat-knowledge-list" role="list" aria-label="Knowledge sources">
            <!-- Knowledge items rendered by JS -->
          </ul>
        </div>

        <div class="chat-sidebar-footer">
          <button id="btn-switch-bot" class="btn btn-secondary btn-sm" style="width: 100%;">
            Switch Bot
          </button>
        </div>
      </aside>

      <!-- Chat Main Area -->
      <main class="chat-main" role="main">
        <!-- Chat Messages -->
        <div id="chat-messages" class="chat-messages" aria-live="polite" aria-label="Chat messages">
          <!-- Messages rendered by JS -->
        </div>

        <!-- Chat Input -->
        <div class="chat-input-area">
          <form id="chat-form" class="chat-input-form" aria-label="Chat input">
            <input
              type="text"
              id="chat-input"
              class="chat-input"
              placeholder="Type your question here..."
              autocomplete="off"
              aria-label="Type your message"
            >
            <button type="submit" class="btn-send" aria-label="Send message">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </form>
        </div>
      </main>
    </div>
  </div>

  <!-- Scripts must be loaded in order: mock-data -> api-service -> app -->
  <script src="js/mock-data.js"></script>
  <script src="js/api-service.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
