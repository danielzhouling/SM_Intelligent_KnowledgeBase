<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SM-Dmall ERP Knowledge Base - Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <!-- SM Logo Placeholder -->
        <svg class="login-logo" viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#667EEA"/>
              <stop offset="100%" style="stop-color:#764BA2"/>
            </linearGradient>
          </defs>
          <!-- SM-style icon -->
          <rect x="5" y="10" width="50" height="40" rx="4" fill="url(#logoGradient)"/>
          <text x="30" y="38" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">SM</text>
          <!-- ERP Text -->
          <text x="70" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#667EEA">ERP</text>
          <text x="70" y="50" font-family="Arial, sans-serif" font-size="10" fill="#A0A0A0">Knowledge Base</text>
        </svg>

        <h1 class="login-title">SM-Dmall ERP</h1>
        <p class="login-subtitle">Intelligent Knowledge Base System</p>
      </div>

      <form id="login-form" class="login-form">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="Enter your username"
            autocomplete="username"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          >
        </div>

        <button type="submit" class="btn btn-ai btn-lg" style="width: 100%;">
          <span>Login</span>
          <span>→</span>
        </button>
      </form>

      <div class="login-hint">
        <p class="login-hint-title">Demo Accounts</p>
        <div class="login-accounts">
          <div class="login-account" data-account="admin">
            <span class="login-account-info">
              <span class="login-account-name">admin</span>
              <span class="login-account-role">System Admin</span>
            </span>
            <span class="login-account-pass">admin123</span>
          </div>
          <div class="login-account" data-account="hq-admin">
            <span class="login-account-info">
              <span class="login-account-name">hq-admin</span>
              <span class="login-account-role">HQ IT Admin</span>
            </span>
            <span class="login-account-pass">password123</span>
          </div>
          <div class="login-account" data-account="store-manager">
            <span class="login-account-info">
              <span class="login-account-name">store-manager</span>
              <span class="login-account-role">Store Manager</span>
            </span>
            <span class="login-account-pass">password123</span>
          </div>
          <div class="login-account" data-account="helpdesk">
            <span class="login-account-info">
              <span class="login-account-name">helpdesk</span>
              <span class="login-account-role">Helpdesk</span>
            </span>
            <span class="login-account-pass">password123</span>
          </div>
        </div>
        <p class="login-mode-hint" id="mode-hint">Mode: Mock (API Service v1.0)</p>
      </div>
    </div>
  </div>

  <!-- ApiService must be loaded before app.js -->
  <script src="js/mock-data.js"></script>
  <script src="js/api-service.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
