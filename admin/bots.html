<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Management - Admin Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .admin-page { display: flex; min-height: 100vh; }
    .admin-sidebar { width: 240px; background: var(--bg-card); border-right: 1px solid var(--border-light); display: flex; flex-direction: column; flex-shrink: 0; }
    .admin-sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-light); }
    .admin-logo { display: flex; align-items: center; gap: 10px; }
    .admin-logo svg { height: 32px; }
    .admin-logo-text { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .admin-nav { flex: 1; padding: 16px 12px; }
    .nav-section { margin-bottom: 24px; }
    .nav-section-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 12px; margin-bottom: 8px; font-weight: 600; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: var(--radius-sm); color: var(--text-secondary); font-size: 14px; text-decoration: none; transition: all var(--transition-fast); margin-bottom: 4px; }
    .nav-item:hover { background: var(--bg-input); color: var(--text-primary); }
    .nav-item.active { background: var(--primary-light); color: var(--primary); }
    .nav-item-icon { font-size: 18px; width: 24px; text-align: center; }
    .admin-sidebar-footer { padding: 16px; border-top: 1px solid var(--border-light); }
    .admin-user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .admin-user-avatar { width: 36px; height: 36px; background: var(--ai-gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; font-weight: 600; }
    .admin-user-details { flex: 1; }
    .admin-user-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .admin-user-role { font-size: 12px; color: var(--text-muted); }
    .admin-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .admin-header { background: var(--bg-card); border-bottom: 1px solid var(--border-light); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .admin-header-title { font-size: 18px; font-weight: 600; color: var(--text-primary); }
    .admin-content { flex: 1; padding: 24px; overflow-y: auto; background: var(--bg-page); }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .page-title { font-size: 20px; font-weight: 600; color: var(--text-primary); }
    .section-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 24px; }
    .section-header { padding: 16px 20px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
    .section-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-light); }
    .data-table td { padding: 14px 16px; font-size: 14px; color: var(--text-primary); border-bottom: 1px solid var(--border-light); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--bg-page); }
    .status-badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .status-badge.enabled { background: #D1FAE5; color: #059669; }
    .status-badge.disabled { background: var(--bg-input); color: var(--text-muted); }
    .action-btns { display: flex; gap: 8px; }
    .btn-action { padding: 6px 12px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; border: none; transition: all var(--transition-fast); }
    .btn-edit { background: var(--primary-light); color: var(--primary); }
    .btn-edit:hover { background: var(--primary); color: white; }
    .btn-toggle { background: #FEF3C7; color: #D97706; }
    .btn-toggle:hover { background: #D97706; color: white; }
    .btn-toggle.enabled { background: #D1FAE5; color: #059669; }
    .btn-toggle.enabled:hover { background: #059669; color: white; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all var(--transition-normal); }
    .modal-overlay.visible { opacity: 1; visibility: visible; }
    .modal { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-xl); padding: 28px; width: 100%; max-width: 500px; transform: scale(0.95); transition: transform var(--transition-normal); box-shadow: var(--shadow-card-hover); }
    .modal-overlay.visible .modal { transform: scale(1); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 17px; font-weight: 600; color: var(--text-primary); }
    .modal-close { width: 32px; height: 32px; background: var(--bg-input); border: none; border-radius: 50%; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all var(--transition-fast); }
    .modal-close:hover { background: #FEE2E2; color: var(--error); }
    .modal-body { margin-bottom: 20px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; }
    .bot-icon-large { font-size: 48px; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <div class="admin-page">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <div class="admin-logo">
          <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="adminLogoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#667EEA"/>
                <stop offset="100%" style="stop-color:#764BA2"/>
              </linearGradient>
            </defs>
            <rect x="2" y="2" width="36" height="36" rx="6" fill="url(#adminLogoGradient)"/>
            <text x="20" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">SM</text>
          </svg>
          <span class="admin-logo-text">Admin Dashboard</span>
        </div>
      </div>

      <nav class="admin-nav">
        <div class="nav-section">
          <div class="nav-section-title">Overview</div>
          <a href="index.html" class="nav-item"><span class="nav-item-icon">📊</span><span>Dashboard</span></a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Management</div>
          <a href="users.html" class="nav-item"><span class="nav-item-icon">👥</span><span>Users</span></a>
          <a href="roles.html" class="nav-item"><span class="nav-item-icon">🔐</span><span>Roles</span></a>
          <a href="bots.html" class="nav-item active"><span class="nav-item-icon">🤖</span><span>Bots</span></a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Feedback</div>
          <a href="feedback.html" class="nav-item"><span class="nav-item-icon">💬</span><span>Feedback Review</span></a>
        </div>
      </nav>

      <div class="admin-sidebar-footer">
        <div class="admin-user-info">
          <div class="admin-user-avatar" id="user-avatar">A</div>
          <div class="admin-user-details">
            <div id="user-name" class="admin-user-name">Admin</div>
            <div id="user-role" class="admin-user-role">Super Admin</div>
          </div>
        </div>
        <button id="btn-logout" class="btn btn-secondary" style="width: 100%;">Logout</button>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h1 class="admin-header-title">Bot Management</h1>
      </header>

      <div class="admin-content">
        <div class="page-header">
          <h2 class="page-title">Registered Bots</h2>
          <button id="btn-add-bot" class="btn btn-primary"><span>➕</span><span>Register New Bot</span></button>
        </div>

        <div class="section-card">
          <div class="section-header">
            <h3 class="section-title">Bots List</h3>
            <span id="bot-count">0 bots</span>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th>Bot</th>
                <th>Description</th>
                <th>Status</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="bots-table"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Bot Modal -->
  <div id="bot-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title" class="modal-title">Register Bot</h3>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <form id="bot-form">
          <input type="hidden" id="bot-id">
          <div class="form-group">
            <label class="form-label" for="bot-key">Bot Key (ID)</label>
            <input type="text" id="bot-key" class="form-input" placeholder="e.g., A, B, C" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="bot-name">Bot Name</label>
            <input type="text" id="bot-name" class="form-input" placeholder="e.g., System Issues" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="bot-name-cn">Chinese Name</label>
            <input type="text" id="bot-name-cn" class="form-input" placeholder="e.g., 系统问题">
          </div>
          <div class="form-group">
            <label class="form-label" for="bot-desc">Description</label>
            <textarea id="bot-desc" class="form-input" placeholder="Describe what this bot does..." rows="3"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="bot-status">Status</label>
            <select id="bot-status" class="form-select" required>
              <option value="enabled">Enabled</option>
              <option value="disabled">Disabled</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button id="btn-cancel" class="btn btn-secondary">Cancel</button>
        <button id="btn-save" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="../js/admin-app.js"></script>
  <script>
    const BOT_ICONS = { 'A': '🔧', 'B': '📚', 'C': '📋', 'default': '🤖' };

    document.addEventListener('DOMContentLoaded', () => {
      if (!AdminSession.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }

      const user = AdminSession.get();
      $('#user-avatar').textContent = user.username.charAt(0).toUpperCase();
      $('#user-name').textContent = user.username;
      $('#user-role').textContent = user.roleName;

      function loadBots() {
        const bots = AdminData.getBots();
        const tbody = $('#bots-table');
        $('#bot-count').textContent = `${bots.length} bots`;

        tbody.innerHTML = bots.map(b => `
          <tr>
            <td>
              <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 24px;">${BOT_ICONS[b.id] || BOT_ICONS.default}</span>
                <div>
                  <div style="font-weight: 500;">${escapeHtml(b.name)}</div>
                  <div style="font-size: 12px; color: var(--text-muted);">${escapeHtml(b.nameCn || '')}</div>
                </div>
              </div>
            </td>
            <td>${escapeHtml(b.description || '-')}</td>
            <td><span class="status-badge ${b.status}">${b.status}</span></td>
            <td>${b.createdAt}</td>
            <td>
              <div class="action-btns">
                <button class="btn-action btn-edit" data-id="${b.id}">Edit</button>
                <button class="btn-action btn-toggle ${b.status}" data-id="${b.id}">${b.status === 'enabled' ? 'Disable' : 'Enable'}</button>
              </div>
            </td>
          </tr>
        `).join('');

        $$('.btn-edit').forEach(btn => btn.addEventListener('click', () => editBot(btn.dataset.id)));
        $$('.btn-toggle').forEach(btn => btn.addEventListener('click', () => toggleBot(btn.dataset.id)));
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      const modal = $('#bot-modal');
      const modalTitle = $('#modal-title');

      function openModal(isEdit = false) {
        modalTitle.textContent = isEdit ? 'Edit Bot' : 'Register New Bot';
        if (!isEdit) {
          $('#bot-key').disabled = false;
        }
        modal.classList.add('visible');
      }

      function closeModal() {
        modal.classList.remove('visible');
        $('#bot-form').reset();
        $('#bot-id').value = '';
        $('#bot-key').disabled = false;
      }

      $('#btn-add-bot').addEventListener('click', () => openModal(false));
      $('#modal-close').addEventListener('click', closeModal);
      $('#btn-cancel').addEventListener('click', closeModal);
      modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

      function editBot(id) {
        const bots = AdminData.getBots();
        const bot = bots.find(b => b.id === id);
        if (bot) {
          $('#bot-id').value = bot.id;
          $('#bot-key').value = bot.id;
          $('#bot-key').disabled = true;
          $('#bot-name').value = bot.name;
          $('#bot-name-cn').value = bot.nameCn || '';
          $('#bot-desc').value = bot.description || '';
          $('#bot-status').value = bot.status;
          openModal(true);
        }
      }

      function toggleBot(id) {
        let bots = AdminData.getBots();
        const index = bots.findIndex(b => b.id === id);
        if (index !== -1) {
          bots[index].status = bots[index].status === 'enabled' ? 'disabled' : 'enabled';
          AdminData.saveBots(bots);
          Toast.success(`Bot ${bots[index].status === 'enabled' ? 'enabled' : 'disabled'} successfully`);
          loadBots();
        }
      }

      $('#btn-save').addEventListener('click', () => {
        const id = $('#bot-id').value;
        const botData = {
          id: $('#bot-key').value.trim().toUpperCase(),
          name: $('#bot-name').value.trim(),
          nameCn: $('#bot-name-cn').value.trim(),
          description: $('#bot-desc').value.trim(),
          status: $('#bot-status').value
        };

        if (!botData.id || !botData.name) {
          Toast.error('Please fill in Bot Key and Name');
          return;
        }

        let bots = AdminData.getBots();

        if (id) {
          // Editing existing - update but keep the ID and permissions
          const index = bots.findIndex(b => b.id === id);
          if (index !== -1) {
            bots[index] = { ...bots[index], ...botData, id: id, permissions: bots[index].permissions };
            AdminData.saveBots(bots);
            Toast.success('Bot updated successfully');
          }
        } else {
          // Check if ID already exists
          if (bots.some(b => b.id === botData.id)) {
            Toast.error('Bot ID already exists');
            return;
          }
          // Auto-generate bot permission
          botData.permissions = [`bot.${botData.id}`];
          botData.createdAt = new Date().toISOString().split('T')[0];
          bots.push(botData);
          AdminData.saveBots(bots, botData.id); // Pass new bot ID for auto-permission generation
          Toast.success('Bot registered successfully');
        }

        closeModal();
        loadBots();
      });

      $('#btn-logout').addEventListener('click', () => {
        AdminSession.clear();
        Toast.success('Logged out successfully');
        setTimeout(() => window.location.href = 'login.html', 500);
      });

      loadBots();
    });
  </script>
</body>
</html>
